---
- name: Sddm > remove conflicting packages
  become: true
  ansible.builtin.package:
    name: "{{ display_manager_sddm_conflict_items }}"
    state: absent
  when: display_manager_sddm_conflict_items is defined

- name: Sddm > block recent version for gentoo
  become: true
  ansible.builtin.template:
    src: package-mask.j2
    dest: /etc/portage/package.mask/sddm
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts["os_family"] == 'Gentoo'

- name: Sddm > installing dependencies
  become: true
  ansible.builtin.package:
    name: "{{ display_manager_sddm_pkg_items }}"
    state: present
  notify:
    - remove display-manager link
    - enable sddm

- name: Sddm > creating required directory
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  with_items:
    - "{{ display_manager_sddm_theme_dir }}"
    - "{{ display_manager_sddm_config_dir }}"
    - /usr/share/wayland-sessions
    - /usr/share/sddm/scripts
  when: display_manager_sddm_theme.name != ''

- name: Sddm > keyboard configuration
  become: true
  ansible.builtin.template:
    src: sddm-xsetup.j2
    dest: /usr/share/sddm/scripts/Xsession
    owner: root
    group: root
    mode: "0755"
  when: display_manager_keymap != ''

- name: Sddm > copying theme {{ display_manager_sddm_theme.name }}
  become: true
  ansible.builtin.copy:
    src: "{{ display_manager_sddm_theme.path }}"
    dest: "{{ display_manager_sddm_theme_dir }}/"
    owner: root
    group: root
    remote_src: true
    mode: "0755"
  when: display_manager_sddm_theme.name != '' and display_manager_sddm_theme.path != ''

- name: Sddm > configuration for {{ display_manager_sddm_theme.name }}
  become: true
  ansible.builtin.template:
    src: sddm-config.j2
    dest: "{{ display_manager_sddm_config_dir }}/desktop.conf"
    owner: root
    group: root
    mode: "0644"
  when: display_manager_sddm_theme.name != ''

- name: Sddm > enable service on systemd
  become: true
  ansible.builtin.service:
    name: sddm
    state: started
    enabled: true
  when:
    - ansible_facts["service_mgr"] == 'systemd'

# https://wiki.gentoo.org/wiki/SDDM#Service
- name: Sddm > openrc
  become: true
  when:
    - not ansible_facts["service_mgr"] == "systemd"
    - ansible_facts["os_family"] == 'Gentoo'
  block:
    - name: Sddm > installing display-manager-init
      ansible.builtin.package:
        name: gui-libs/display-manager-init
        state: present

    - name: Sddm > configuring /etc/conf.d/display-manager
      ansible.builtin.template:
        src: display-manager.j2
        dest: /etc/conf.d/display-manager
        owner: root
        group: root
        mode: "0644"

    - name: Sddm > enabling openrc service
      ansible.builtin.service:
        name: display-manager
        state: started
        enabled: true
